<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINEL - Earthquake Globe</title>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.107/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.107/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        #cesiumContainer {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 100%;
        }
        #status {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px;
            border-radius: 5px;
            z-index: 1000;
            font-size: 14px;
            max-width: 300px;
        }
        #legend {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px;
            border-radius: 5px;
            z-index: 1000;
            font-size: 12px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            margin: 5px 0;
        }
        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            margin-right: 10px;
            border: 2px solid white;
        }
        .event-info {
            position: absolute;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 15px;
            border-radius: 5px;
            z-index: 1000;
            max-width: 300px;
            display: none;
        }
    </style>
</head>
<body>
    <div id="cesiumContainer"></div>
    <div id="status">
        <div>🌍 SENTINEL Earthquake Globe</div>
        <div id="connectionStatus">Connecting to SSE stream...</div>
        <div id="eventCount">Events: 0</div>
        <div id="lastUpdate">Last update: Never</div>
    </div>
    
    <div id="legend">
        <h3 style="margin-top: 0; margin-bottom: 10px;">Event Types</h3>
        <div class="legend-item">
            <div class="legend-color" style="background-color: #ff4444;"></div>
            <span>Earthquake</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background-color: #44ff44;"></div>
            <span>Flood</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background-color: #4444ff;"></div>
            <span>Cyclone</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background-color: #ff44ff;"></div>
            <span>Volcano</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background-color: #ffff44;"></div>
            <span>Drought</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background-color: #44ffff;"></div>
            <span>Other Disaster</span>
        </div>
    </div>
    
    <div id="eventInfo" class="event-info"></div>

    <script>
        // Cesium Ion token (you'll need to get your own from https://cesium.com/ion/)
        Cesium.Ion.defaultAccessToken = window.SENTINEL_CONFIG?.cesiumToken || '';;
        
        // Initialize the Cesium Viewer
        const viewer = new Cesium.Viewer('cesiumContainer', {
            terrainProvider: Cesium.createWorldTerrain(),
            animation: false,
            timeline: false,
            navigationHelpButton: false,
            homeButton: true,
            sceneModePicker: true,
            baseLayerPicker: true,
            geocoder: true,
            fullscreenButton: true,
            infoBox: false
        });
        
        // Set initial view
        viewer.camera.setView({
            destination: Cesium.Cartesian3.fromDegrees(0, 20, 15000000),
            orientation: {
                heading: 0,
                pitch: -Cesium.Math.PI_OVER_TWO,
                roll: 0
            }
        });
        
        // Store events and markers
        const events = new Map();
        let eventCount = 0;
        
        // Color mapping for event categories
        const categoryColors = {
            'earthquake': Cesium.Color.fromCssColorString('#ff4444'),
            'flood': Cesium.Color.fromCssColorString('#44ff44'),
            'cyclone': Cesium.Color.fromCssColorString('#4444ff'),
            'volcano': Cesium.Color.fromCssColorString('#ff44ff'),
            'drought': Cesium.Color.fromCssColorString('#ffff44'),
            'disaster': Cesium.Color.fromCssColorString('#44ffff')
        };
        
        // Size mapping for severity
        const severitySizes = {
            'low': 8,
            'medium': 12,
            'high': 16,
            'critical': 20
        };
        
        // Connect to SSE stream
        function connectToSSE() {
            const eventSource = new EventSource('http://localhost:8080/api/events/stream');
            
            eventSource.onopen = function() {
                updateStatus('Connected to SSE stream', 'green');
            };
            
            eventSource.onmessage = function(event) {
                try {
                    const data = JSON.parse(event.data);
                    addEventToGlobe(data);
                    updateStatus('Receiving real-time events', 'green');
                } catch (error) {
                    console.error('Error parsing event:', error);
                    updateStatus('Error parsing event', 'red');
                }
            };
            
            eventSource.onerror = function(error) {
                console.error('SSE Error:', error);
                updateStatus('SSE connection error - retrying in 5s', 'orange');
                eventSource.close();
                
                // Reconnect after 5 seconds
                setTimeout(connectToSSE, 5000);
            };
            
            // Also load existing events
            loadExistingEvents();
        }
        
        // Load existing events from the API
        async function loadExistingEvents() {
            try {
                const response = await fetch('http://localhost:8080/api/events?limit=100');
                const data = await response.json();
                
                if (data.events && Array.isArray(data.events)) {
                    data.events.forEach(event => {
                        addEventToGlobe(event);
                    });
                    updateStatus(`Loaded ${data.events.length} existing events`, 'green');
                }
            } catch (error) {
                console.error('Error loading existing events:', error);
                updateStatus('Error loading existing events', 'orange');
            }
        }
        
        // Add an event to the globe
        function addEventToGlobe(event) {
            if (!event.location || !event.location.coordinates || event.location.coordinates.length < 2) {
                console.warn('Event missing coordinates:', event);
                return;
            }
            
            const [longitude, latitude] = event.location.coordinates;
            
            // Skip if coordinates are invalid
            if (longitude < -180 || longitude > 180 || latitude < -90 || latitude > 90) {
                console.warn('Invalid coordinates:', event);
                return;
            }
            
            // Get color based on category
            const color = categoryColors[event.category] || Cesium.Color.WHITE;
            
            // Get size based on severity
            const size = severitySizes[event.severity] || 10;
            
            // Create point for earthquake
            const point = viewer.entities.add({
                position: Cesium.Cartesian3.fromDegrees(longitude, latitude),
                point: {
                    pixelSize: size,
                    color: color,
                    outlineColor: Cesium.Color.WHITE,
                    outlineWidth: 2,
                    heightReference: Cesium.HeightReference.CLAMP_TO_GROUND
                },
                label: {
                    text: `M${event.magnitude || '?'}`,
                    font: '14px sans-serif',
                    fillColor: Cesium.Color.WHITE,
                    outlineColor: Cesium.Color.BLACK,
                    outlineWidth: 2,
                    style: Cesium.LabelStyle.FILL_AND_OUTLINE,
                    verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
                    pixelOffset: new Cesium.Cartesian2(0, -size - 5),
                    show: event.magnitude > 5.0 // Only show label for significant events
                },
                description: createEventDescription(event)
            });
            
            // Store the entity
            events.set(event.id, point);
            eventCount++;
            
            // Update UI
            updateEventCount();
            updateLastUpdate();
            
            // Add click handler
            point.clickHandler = function() {
                showEventInfo(event, point);
            };
        }
        
        // Create HTML description for event
        function createEventDescription(event) {
            return `
                <div style="font-family: sans-serif; max-width: 300px;">
                    <h3 style="margin-top: 0; color: #4CAF50;">${event.title || 'Untitled Event'}</h3>
                    <p><strong>Type:</strong> ${event.category || 'Unknown'}</p>
                    <p><strong>Severity:</strong> ${event.severity || 'Unknown'}</p>
                    ${event.magnitude ? `<p><strong>Magnitude:</strong> ${event.magnitude}</p>` : ''}
                    <p><strong>Source:</strong> ${event.source || 'Unknown'}</p>
                    <p><strong>Time:</strong> ${new Date(event.occurred_at).toLocaleString()}</p>
                    <p>${event.description || 'No description available.'}</p>
                    <p><small>ID: ${event.id}</small></p>
                </div>
            `;
        }
        
        // Show event info panel
        function showEventInfo(event, entity) {
            const infoDiv = document.getElementById('eventInfo');
            infoDiv.innerHTML = `
                <h3 style="margin-top: 0;">${event.title || 'Untitled Event'}</h3>
                <p><strong>Type:</strong> ${event.category || 'Unknown'}</p>
                <p><strong>Severity:</strong> ${event.severity || 'Unknown'}</p>
                ${event.magnitude ? `<p><strong>Magnitude:</strong> ${event.magnitude}</p>` : ''}
                <p><strong>Location:</strong> ${event.location.coordinates[1].toFixed(2)}°N, ${event.location.coordinates[0].toFixed(2)}°E</p>
                <p><strong>Time:</strong> ${new Date(event.occurred_at).toLocaleString()}</p>
                <p>${event.description || 'No description available.'}</p>
                <button onclick="flyToEvent('${event.id}')" style="margin-top: 10px; padding: 5px 10px; background: #4CAF50; color: white; border: none; border-radius: 3px; cursor: pointer;">
                    Fly to Location
                </button>
                <button onclick="hideEventInfo()" style="margin-top: 10px; margin-left: 10px; padding: 5px 10px; background: #f44336; color: white; border: none; border-radius: 3px; cursor: pointer;">
                    Close
                </button>
            `;
            infoDiv.style.display = 'block';
            infoDiv.style.left = '20px';
            infoDiv.style.top = '100px';
        }
        
        // Fly to event location
        window.flyToEvent = function(eventId) {
            const entity = events.get(eventId);
            if (entity) {
                viewer.flyTo(entity);
            }
        };
        
        // Hide event info
        window.hideEventInfo = function() {
            document.getElementById('eventInfo').style.display = 'none';
        };
        
        // Update status display
        function updateStatus(message, color) {
            const statusDiv = document.getElementById('connectionStatus');
            statusDiv.textContent = message;
            statusDiv.style.color = color || 'white';
        }
        
        // Update event count
        function updateEventCount() {
            document.getElementById('eventCount').textContent = `Events: ${eventCount}`;
        }
        
        // Update last update time
        function updateLastUpdate() {
            const now = new Date();
            document.getElementById('lastUpdate').textContent = `Last update: ${now.toLocaleTimeString()}`;
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            connectToSSE();
            
            // Add click handler to entities
            viewer.screenSpaceEventHandler.setInputAction(function(click) {
                const pickedObject = viewer.scene.pick(click.position);
                if (Cesium.defined(pickedObject) && pickedObject.id && pickedObject.id.clickHandler) {
                    pickedObject.id.clickHandler();
                } else {
                    hideEventInfo();
                }
            }, Cesium.ScreenSpaceEventType.LEFT_CLICK);
        });
    </script>
</body>
</html>
