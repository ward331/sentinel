<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Final Globe Texture Test</title>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.119/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.119/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; }
        #cesiumContainer { width: 100vw; height: 100vh; }
        #controlPanel {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 20px;
            border-radius: 10px;
            z-index: 1000;
            max-width: 500px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
        }
        h2 { margin-top: 0; color: #4CAF50; }
        .test-result { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .success { background: rgba(76, 175, 80, 0.2); border-left: 4px solid #4CAF50; }
        .error { background: rgba(244, 67, 54, 0.2); border-left: 4px solid #f44336; }
        .warning { background: rgba(255, 152, 0, 0.2); border-left: 4px solid #ff9800; }
        button {
            margin: 5px;
            padding: 8px 16px;
            background: #2196F3;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover { background: #1976D2; }
        button.success-btn { background: #4CAF50; }
        button.warning-btn { background: #ff9800; }
        button.error-btn { background: #f44336; }
        .section { margin: 15px 0; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); }
        .section-title { font-weight: bold; margin-bottom: 10px; color: #ccc; }
    </style>
</head>
<body>
    <div id="cesiumContainer"></div>
    <div id="controlPanel">
        <h2>🌍 Globe Texture Fix Verification</h2>
        <p>Testing the fix for blue globe texture issue in SENTINEL dashboard.</p>
        
        <div class="section">
            <div class="section-title">Test Results</div>
            <div id="testResults">
                <div class="test-result">Running tests...</div>
            </div>
        </div>
        
        <div class="section">
            <div class="section-title">Manual Tests</div>
            <div>
                <button onclick="testAsset(2)" class="success-btn">Test Asset 2 (Bing Aerial)</button>
                <button onclick="testAsset(1)" class="success-btn">Test Asset 1 (Bing No Labels)</button>
                <button onclick="testAsset(3)" class="success-btn">Test Asset 3 (Bing Roads)</button>
                <button onclick="testAsset(4)" class="success-btn">Test Asset 4 (Bing Road)</button>
                <button onclick="testOpenStreetMap()" class="warning-btn">Test OpenStreetMap</button>
                <button onclick="testArcGIS()" class="warning-btn">Test ArcGIS</button>
                <button onclick="testBlueGlobe()" class="error-btn">Test Blue Globe (Issue)</button>
            </div>
        </div>
        
        <div class="section">
            <div class="section-title">Diagnostics</div>
            <div>
                <button onclick="checkImageryLayers()">Check Imagery Layers</button>
                <button onclick="checkConsole()">Open Browser Console</button>
                <button onclick="resetView()">Reset View</button>
            </div>
        </div>
    </div>
    
    <script>
        // Cesium Ion Token (same as dashboard)
        const CESIUM_ION_TOKEN = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI2YWU4MmFmYS04Yzg3LTQwNTgtYWQxOC1hNzYyYjIyN2JhOWUiLCJpZCI6NDAwMzcwLCJpYXQiOjE3NzI5OTA1NTB9.jqLDqHgeyZwX2LETHlbnXMHWKPKyDW5BqWNSIjiwyws';
        
        let viewer = null;
        let currentTest = null;
        
        function addTestResult(message, type = 'info') {
            const results = document.getElementById('testResults');
            const resultDiv = document.createElement('div');
            resultDiv.className = `test-result ${type}`;
            resultDiv.textContent = message;
            results.appendChild(resultDiv);
            results.scrollTop = results.scrollHeight;
            console.log(`[${type.toUpperCase()}] ${message}`);
        }
        
        function clearViewer() {
            if (viewer) {
                viewer.destroy();
                viewer = null;
                addTestResult('Viewer destroyed', 'warning');
            }
        }
        
        function setDefaultView() {
            if (viewer) {
                viewer.camera.setView({
                    destination: Cesium.Cartesian3.fromDegrees(0, 20, 15000000),
                    orientation: {
                        heading: 0,
                        pitch: Cesium.Math.toRadians(-90),
                        roll: 0
                    }
                });
            }
        }
        
        async function testAsset(assetId) {
            clearViewer();
            currentTest = `Asset ${assetId}`;
            Cesium.Ion.defaultAccessToken = CESIUM_ION_TOKEN;
            
            addTestResult(`Testing Cesium Ion asset ${assetId}...`, 'info');
            
            try {
                // Test if asset is accessible
                const imageryProvider = new Cesium.IonImageryProvider({ assetId: assetId });
                await imageryProvider.readyPromise;
                addTestResult(`✅ Asset ${assetId} is accessible`, 'success');
                
                // Create viewer
                viewer = new Cesium.Viewer('cesiumContainer', {
                    baseLayerPicker: true,
                    animation: false,
                    timeline: false,
                    navigationHelpButton: false,
                    imageryProvider: imageryProvider
                });
                
                setDefaultView();
                addTestResult(`✅ Viewer created with asset ${assetId}`, 'success');
                
                // Check imagery after delay
                setTimeout(() => {
                    const layers = viewer.imageryLayers;
                    if (layers.length > 0) {
                        addTestResult(`✅ ${layers.length} imagery layer(s) loaded`, 'success');
                    } else {
                        addTestResult(`⚠️ No imagery layers loaded (globe may appear blue)`, 'warning');
                    }
                }, 2000);
                
            } catch (error) {
                addTestResult(`❌ Asset ${assetId} failed: ${error.message}`, 'error');
            }
        }
        
        function testOpenStreetMap() {
            clearViewer();
            currentTest = 'OpenStreetMap';
            addTestResult('Testing OpenStreetMap...', 'info');
            
            try {
                viewer = new Cesium.Viewer('cesiumContainer', {
                    baseLayerPicker: true,
                    animation: false,
                    timeline: false,
                    navigationHelpButton: false,
                    imageryProvider: new Cesium.OpenStreetMapImageryProvider({
                        url: 'https://a.tile.openstreetmap.org/'
                    })
                });
                
                setDefaultView();
                addTestResult('✅ OpenStreetMap loaded successfully', 'success');
                
            } catch (error) {
                addTestResult(`❌ OpenStreetMap failed: ${error.message}`, 'error');
            }
        }
        
        function testArcGIS() {
            clearViewer();
            currentTest = 'ArcGIS';
            addTestResult('Testing ArcGIS World Imagery...', 'info');
            
            try {
                viewer = new Cesium.Viewer('cesiumContainer', {
                    baseLayerPicker: true,
                    animation: false,
                    timeline: false,
                    navigationHelpButton: false,
                    imageryProvider: new Cesium.ArcGisMapServerImageryProvider({
                        url: 'https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer'
                    })
                });
                
                setDefaultView();
                addTestResult('✅ ArcGIS World Imagery loaded successfully', 'success');
                
            } catch (error) {
                addTestResult(`❌ ArcGIS failed: ${error.message}`, 'error');
            }
        }
        
        function testBlueGlobe() {
            clearViewer();
            currentTest = 'Blue Globe (Issue)';
            addTestResult('Testing blue globe issue (no imagery)...', 'info');
            
            try {
                viewer = new Cesium.Viewer('cesiumContainer', {
                    baseLayerPicker: false,
                    animation: false,
                    timeline: false,
                    navigationHelpButton: false,
                    imageryProvider: false // No imagery - this causes blue globe
                });
                
                setDefaultView();
                addTestResult('⚠️ Created viewer WITHOUT imagery (blue globe expected)', 'warning');
                addTestResult('This is what the dashboard showed before the fix', 'warning');
                
            } catch (error) {
                addTestResult(`❌ Failed: ${error.message}`, 'error');
            }
        }
        
        function checkImageryLayers() {
            if (!viewer) {
                addTestResult('❌ No viewer created yet', 'error');
                return;
            }
            
            const layers = viewer.imageryLayers;
            addTestResult(`Imagery layers: ${layers.length}`, 'info');
            
            if (layers.length === 0) {
                addTestResult('❌ No imagery layers! Globe will appear blue.', 'error');
            } else {
                for (let i = 0; i < layers.length; i++) {
                    const layer = layers.get(i);
                    addTestResult(`Layer ${i}: ${layer.imageryProvider.constructor.name}`, 'success');
                }
            }
        }
        
        function checkConsole() {
            addTestResult('Open browser Developer Tools (F12) and check Console tab', 'info');
            addTestResult('Look for Cesium initialization messages and errors', 'info');
        }
        
        function resetView() {
            if (viewer) {
                setDefaultView();
                addTestResult('View reset to default position', 'info');
            }
        }
        
        // Run automatic tests on load
        async function runAutomaticTests() {
            addTestResult('Starting automatic tests...', 'info');
            
            // Test 1: Check Cesium library
            if (typeof Cesium === 'undefined') {
                addTestResult('❌ Cesium library not loaded', 'error');
                return;
            }
            addTestResult('✅ Cesium library loaded', 'success');
            
            // Test 2: Test token with asset 2
            Cesium.Ion.defaultAccessToken = CESIUM_ION_TOKEN;
            try {
                const testProvider = new Cesium.IonImageryProvider({ assetId: 2 });
                await testProvider.readyPromise;
                addTestResult('✅ Cesium Ion token is valid', 'success');
            } catch (error) {
                addTestResult(`❌ Cesium Ion token error: ${error.message}`, 'error');
                addTestResult('Will use OpenStreetMap as fallback', 'warning');
            }
            
            // Test 3: Create viewer with asset 2
            try {
                viewer = new Cesium.Viewer('cesiumContainer', {
                    baseLayerPicker: true,
                    animation: false,
                    timeline: false,
                    navigationHelpButton: false,
                    imageryProvider: new Cesium.IonImageryProvider({ assetId: 2 })
                });
                
                setDefaultView();
                addTestResult('✅ Viewer created successfully', 'success');
                addTestResult('If you see Earth imagery, the fix works!', 'success');
                
                // Add test marker
                viewer.entities.add({
                    position: Cesium.Cartesian3.fromDegrees(0, 0),
                    point: {
                        pixelSize: 15,
                        color: Cesium.Color.RED,
                        outlineColor: Cesium.Color.WHITE,
                        outlineWidth: 2
                    },
                    label: {
                        text: 'Test Marker (0,0)',
                        font: '14px sans-serif',
                        fillColor: Cesium.Color.WHITE,
                        outlineColor: Cesium.Color.BLACK,
                        outlineWidth: 2,
                        style: Cesium.LabelStyle.FILL_AND_OUTLINE,
                        pixelOffset: new Cesium.Cartesian2(0, -20)
                    }
                });
                
            } catch (error) {
                addTestResult(`❌ Viewer creation failed: ${error.message}`, 'error');
                
                // Try fallback
                try {
                    viewer = new Cesium.Viewer('cesiumContainer', {
                        baseLayerPicker: true,
                        animation: false,
                        timeline: false,
                        navigationHelpButton: false,
                        imageryProvider: new Cesium.OpenStreetMapImageryProvider({
                            url: 'https://a.tile.openstreetmap.org/'
                        })
                    });
                    
                    setDefaultView();
                    addTestResult('✅ Created viewer with OpenStreetMap fallback', 'success');
                } catch (fallbackError) {
                    addTestResult(`❌ Fallback also failed: ${fallbackError.message}`, 'error');
                }
            }
            
            addTestResult('Automatic tests completed', 'info');
            addTestResult('Use manual tests above to try different providers', 'info');
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            addTestResult('Globe Texture Fix Test initialized', 'info');
            addTestResult('Testing the fix for blue globe issue in SENTINEL dashboard', 'info');
            
            // Run automatic tests
            setTimeout(runAutomaticTests, 1000);
        });
    </script>
</body>
</html>
