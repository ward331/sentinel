name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
        cache: true

    - name: Verify Go version
      run: go version

    - name: Get dependencies
      run: go mod download

    - name: Run tests
      run: go test ./... -v

    - name: Build binary
      run: go build -o sentinel ./cmd/sentinel

    - name: Run smoke test
      run: |
        chmod +x sentinel
        ./sentinel --version
        ./sentinel --help
        echo "✅ Build and basic tests passed"

  lint:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Run gofmt
      run: |
        if [ -n "$(gofmt -l .)" ]; then
          echo "❌ Code is not formatted properly"
          gofmt -l .
          exit 1
        fi
        echo "✅ Code formatting is correct"

    - name: Run go vet
      run: go vet ./...

  cross-build:
    runs-on: ubuntu-latest
    needs: [test, lint]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Cross-compile for all platforms
      run: |
        PLATFORMS="linux/amd64 linux/arm64 windows/amd64 darwin/amd64 darwin/arm64"
        
        for PLATFORM in $PLATFORMS; do
          GOOS=${PLATFORM%/*}
          GOARCH=${PLATFORM#*/}
          OUTPUT="sentinel-$GOOS-$GOARCH"
          if [ "$GOOS" = "windows" ]; then
            OUTPUT="$OUTPUT.exe"
          fi
          
          echo "Building for $GOOS/$GOARCH..."
          GOOS=$GOOS GOARCH=$GOARCH go build -o $OUTPUT ./cmd/sentinel
          
          if [ -f "$OUTPUT" ]; then
            echo "✅ $GOOS/$GOARCH: $(du -h $OUTPUT | cut -f1)"
            rm $OUTPUT
          else
            echo "❌ Failed to build for $GOOS/$GOARCH"
            exit 1
          fi
        done
        
        echo "✅ All platforms compile successfully"