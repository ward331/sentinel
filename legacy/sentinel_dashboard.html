<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINEL - Real-time World Event Dashboard</title>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.119/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.119/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #0a0e17;
            color: #e0e0e0;
            overflow: hidden;
            height: 100vh;
        }

        #cesiumContainer {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 1;
        }

        /* Dashboard overlay */
        .dashboard-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            z-index: 100;
            pointer-events: none;
        }

        /* Sidebar */
        .sidebar {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 350px;
            z-index: 100;
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Event list panel */
        .event-list-panel {
            background: rgba(10, 14, 23, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            max-height: 500px;
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            padding: 15px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.2);
        }

        .panel-header h3 {
            font-size: 16px;
            font-weight: 600;
            color: #e0e0e0;
            margin: 0;
        }

        .panel-header p {
            font-size: 12px;
            color: #8a94a6;
            margin: 4px 0 0 0;
        }

        /* Search and filter */
        .search-filter-section {
            padding: 15px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.1);
        }

        .search-box {
            position: relative;
            margin-bottom: 15px;
        }

        .search-box input {
            width: 100%;
            padding: 10px 15px 10px 40px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            border-color: #667eea;
            background: rgba(255, 255, 255, 0.08);
        }

        .search-box::before {
            content: '🔍';
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #8a94a6;
            font-size: 14px;
        }

        .filter-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .filter-btn {
            padding: 6px 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            color: #8a94a6;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #e0e0e0;
        }

        .filter-btn.active {
            background: rgba(102, 126, 234, 0.2);
            border-color: #667eea;
            color: #667eea;
        }

        /* Event list */
        .event-list {
            flex: 1;
            overflow-y: auto;
            max-height: 300px;
        }

        .event-list::-webkit-scrollbar {
            width: 6px;
        }

        .event-list::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
        }

        .event-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }

        .event-list::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .event-item {
            padding: 15px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .event-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .event-item.active {
            background: rgba(102, 126, 234, 0.1);
            border-left: 3px solid #667eea;
        }

        .event-marker {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .event-content {
            flex: 1;
            min-width: 0;
        }

        .event-title {
            font-size: 14px;
            font-weight: 500;
            color: #e0e0e0;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .event-meta {
            font-size: 12px;
            color: #8a94a6;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .event-source {
            font-weight: 500;
        }

        .event-time {
            font-family: 'Monaco', 'Consolas', monospace;
        }

        .no-events {
            padding: 30px 20px;
            text-align: center;
            color: #8a94a6;
            font-size: 14px;
        }

        /* Header */
        .dashboard-header {
            background: rgba(10, 14, 23, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            pointer-events: auto;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            color: white;
        }

        .logo-text h1 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }

        .logo-text p {
            font-size: 12px;
            color: #8a94a6;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Stats panel */
        .stats-panel {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: rgba(20, 25, 40, 0.8);
            border-radius: 8px;
            padding: 15px;
            min-width: 120px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            border-color: rgba(102, 126, 234, 0.5);
            transform: translateY(-2px);
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 12px;
            color: #8a94a6;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .total-events .stat-value {
            color: #667eea;
        }

        .connected .stat-value {
            color: #48bb78;
        }

        .last-update .stat-value {
            color: #ed8936;
            font-size: 18px;
        }

        /* Event counter badge */
        .event-counter {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100;
            pointer-events: auto;
        }

        .counter-badge {
            background: rgba(220, 38, 38, 0.9);
            color: white;
            padding: 12px 20px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 20px rgba(220, 38, 38, 0.3);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 4px 20px rgba(220, 38, 38, 0.3); }
            50% { box-shadow: 0 4px 30px rgba(220, 38, 38, 0.5); }
            100% { box-shadow: 0 4px 20px rgba(220, 38, 38, 0.3); }
        }

        .counter-icon {
            font-size: 20px;
        }

        /* Event details panel */
        .event-panel {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 400px;
            max-height: 60vh;
            background: rgba(10, 14, 23, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            z-index: 100;
            overflow: hidden;
            pointer-events: auto;
            display: none;
        }

        .panel-header {
            background: rgba(20, 25, 40, 0.9);
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .panel-header h3 {
            font-size: 18px;
            font-weight: 600;
            color: #667eea;
            margin-bottom: 5px;
        }

        .panel-header .event-source {
            font-size: 12px;
            color: #8a94a6;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .panel-content {
            padding: 20px;
            overflow-y: auto;
            max-height: calc(60vh - 120px);
        }

        .event-detail {
            margin-bottom: 15px;
        }

        .detail-label {
            font-size: 12px;
            color: #8a94a6;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .detail-value {
            font-size: 14px;
            color: #e0e0e0;
        }

        .magnitude-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 12px;
            margin-right: 8px;
        }

        .severity-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 12px;
        }

        .close-panel {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            color: #8a94a6;
            font-size: 20px;
            cursor: pointer;
            transition: color 0.3s;
        }

        .close-panel:hover {
            color: #e0e0e0;
        }

        /* Legend */
        .legend {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(10, 14, 23, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 100;
            pointer-events: auto;
        }

        .legend h4 {
            font-size: 14px;
            margin-bottom: 10px;
            color: #667eea;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            font-size: 12px;
        }

        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }

        /* Connection status */
        .connection-status {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 14, 23, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 10px 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 100;
            pointer-events: auto;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #48bb78;
            animation: blink 2s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .status-text {
            font-size: 12px;
            color: #8a94a6;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .dashboard-overlay {
                top: 10px;
                left: 10px;
                right: 10px;
            }
            
            .event-panel {
                width: calc(100% - 40px);
                right: 20px;
            }
            
            .legend {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div id="cesiumContainer"></div>
    
    <!-- Dashboard Overlay -->
    <div class="dashboard-overlay">
        <div class="dashboard-header">
            <div class="header-top">
                <div class="logo">
                    <div class="logo-icon">S</div>
                    <div class="logo-text">
                        <h1>SENTINEL</h1>
                        <p>Real-time World Event Dashboard</p>
                    </div>
                </div>
                <div class="stats-panel">
                    <div class="stat-card total-events">
                        <div class="stat-value" id="totalEvents">0</div>
                        <div class="stat-label">Total Events</div>
                    </div>
                    <div class="stat-card connected">
                        <div class="stat-value" id="connectedClients">1</div>
                        <div class="stat-label">Connected</div>
                    </div>
                    <div class="stat-card last-update">
                        <div class="stat-value" id="lastUpdate">Just now</div>
                        <div class="stat-label">Last Update</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Event Counter Badge -->
    <div class="event-counter">
        <div class="counter-badge">
            <span class="counter-icon">🌍</span>
            <span id="liveEventCount">0</span> Live Events
        </div>
    </div>
    
    <!-- Sidebar with Event List, Filtering, and Search -->
    <div class="sidebar">
        <div class="event-list-panel">
            <div class="panel-header">
                <h3>Event List</h3>
                <p id="eventListCount">0 events</p>
            </div>
            
            <div class="search-filter-section">
                <div class="search-box">
                    <input type="text" id="eventSearch" placeholder="Search events..." oninput="filterEvents()">
                </div>
                
                <div class="filter-buttons">
                    <button class="filter-btn active" onclick="setEventFilter('all')">All</button>
                    <button class="filter-btn" onclick="setEventFilter('earthquake')">Earthquakes</button>
                    <button class="filter-btn" onclick="setEventFilter('storm')">Storms</button>
                    <button class="filter-btn" onclick="setEventFilter('flood')">Floods</button>
                    <button class="filter-btn" onclick="setEventFilter('volcano')">Volcanoes</button>
                    <button class="filter-btn" onclick="setEventFilter('other')">Other</button>
                </div>
            </div>
            
            <div class="event-list" id="eventList">
                <div class="no-events">No events to display</div>
            </div>
        </div>
    </div>
    
    <!-- Event Details Panel -->
    <div class="event-panel" id="eventPanel">
        <button class="close-panel" onclick="closeEventPanel()">×</button>
        <div class="panel-header">
            <h3 id="eventTitle">Event Title</h3>
            <div class="event-source" id="eventSource">Source: Unknown</div>
        </div>
        <div class="panel-content" id="eventDetails">
            <!-- Event details will be populated here -->
        </div>
    </div>
    
    <!-- Legend -->
    <div class="legend">
        <h4>Event Types</h4>
        <div class="legend-item">
            <div class="legend-color" style="background-color: #ef4444;"></div>
            <span>Earthquakes</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background-color: #3b82f6;"></div>
            <span>Storms</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background-color: #06b6d4;"></div>
            <span>Floods</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background-color: #f97316;"></div>
            <span>Volcanoes</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background-color: #eab308;"></div>
            <span>Other Events</span>
        </div>
    </div>
    
    <!-- Connection Status -->
    <div class="connection-status">
        <div class="status-dot"></div>
        <div class="status-text" id="connectionStatus">Connected to real-time stream</div>
    </div>

    <script>
        // Dynamic backend URL based on current window location
        // Backend URL will be injected by backend
        const backendURL = window.SENTINEL_CONFIG?.backendURL || (window.location.protocol + '//' + window.location.hostname + ':8080');
        console.log('Backend URL:', backendURL);
        
        // Cesium Ion Token
        // Cesium token will be injected by backend
        Cesium.Ion.defaultAccessToken = window.SENTINEL_CONFIG?.cesiumToken || '';

        // Initialize Cesium Viewer with async terrain
        let viewer;
        
        async function initializeCesiumViewer() {
            try {
                let terrainProvider = null;
                let terrainError = null;
                
                // Try to create terrain provider asynchronously, but don't fail if it doesn't work
                try {
                    console.log('Creating terrain provider...');
                    terrainProvider = await Cesium.createWorldTerrainAsync();
                    console.log('✅ Terrain provider created successfully');
                } catch (error) {
                    console.warn('⚠️ Could not create terrain provider:', error.message);
                    terrainError = error;
                    // Continue without terrain - it's not critical for imagery
                }
                
                // Create viewer with terrain and try multiple imagery providers
                let viewerCreated = false;
                let viewerError = null;
                
                // Try multiple Ion imagery asset IDs for satellite imagery
                const assetIdsToTry = [
                    2,      // Bing Maps Aerial with Labels (commonly used)
                    1,      // Bing Maps Aerial (no labels)
                    3,      // Bing Maps Roads
                    4,      // OpenStreetMap (through Ion)
                    3812,   // Landsat 8 (satellite imagery)
                    3956    // Sentinel-2 (satellite imagery)
                ];
                
                // Try each asset ID until one works
                for (const assetId of assetIdsToTry) {
                    try {
                        console.log(`Trying Cesium Ion asset ID: ${assetId}...`);
                        
                        // Create imagery provider first to test it
                        const imageryProvider = new Cesium.IonImageryProvider({ assetId: assetId });
                        
                        // Wait for the imagery provider to be ready
                        await imageryProvider.readyPromise;
                        console.log(`✅ Asset ${assetId} is accessible`);
                        
                        // Now create the viewer
                        viewer = new Cesium.Viewer('cesiumContainer', {
                            terrainProvider: terrainProvider,
                            animation: false,
                            timeline: false,
                            navigationHelpButton: false,
                            homeButton: false,
                            sceneModePicker: false,
                            baseLayerPicker: true, // Enable layer picker to debug
                            fullscreenButton: false,
                            vrButton: false,
                            geocoder: false,
                            infoBox: false,
                            selectionIndicator: false,
                            shadows: false, // Disable shadows for better performance
                            shouldAnimate: false,
                            imageryProvider: imageryProvider
                        });
                        
                        viewerCreated = true;
                        console.log(`✅ Cesium viewer initialized with Ion imagery (assetId: ${assetId})`);
                        
                        // Update status to show which asset ID worked
                        updateConnectionStatus(`Using satellite imagery (asset ${assetId})`, 'success');
                        
                        // Add debug info to console
                        console.log('Viewer created successfully. Check layer picker (top right) for available layers.');
                        
                        break; // Success, exit loop
                        
                    } catch (ionError) {
                        console.warn(`❌ Asset ID ${assetId} failed:`, ionError.message);
                        viewerError = ionError;
                        // Continue to next asset ID
                    }
                }
                
                // If no Ion asset worked, try alternative providers
                if (!viewerCreated) {
                    console.warn('All Ion imagery failed, trying alternative providers...');
                    
                    // Try OpenStreetMap directly
                    try {
                        console.log('Trying OpenStreetMap...');
                        viewer = new Cesium.Viewer('cesiumContainer', {
                            terrainProvider: terrainProvider,
                            animation: false,
                            timeline: false,
                            navigationHelpButton: false,
                            homeButton: false,
                            sceneModePicker: false,
                            baseLayerPicker: true,
                            fullscreenButton: false,
                            vrButton: false,
                            geocoder: false,
                            infoBox: false,
                            selectionIndicator: false,
                            shadows: false,
                            shouldAnimate: false,
                            imageryProvider: new Cesium.OpenStreetMapImageryProvider({
                                url: 'https://a.tile.openstreetmap.org/'
                            })
                        });
                        viewerCreated = true;
                        console.log('✅ Cesium viewer initialized with OpenStreetMap imagery');
                        updateConnectionStatus('Using OpenStreetMap imagery', 'warning');
                    } catch (osmError) {
                        console.error('OpenStreetMap failed:', osmError.message);
                        
                        // Try ArcGIS as last resort
                        try {
                            console.log('Trying ArcGIS World Imagery...');
                            viewer = new Cesium.Viewer('cesiumContainer', {
                                terrainProvider: terrainProvider,
                                animation: false,
                                timeline: false,
                                navigationHelpButton: false,
                                homeButton: false,
                                sceneModePicker: false,
                                baseLayerPicker: true,
                                fullscreenButton: false,
                                vrButton: false,
                                geocoder: false,
                                infoBox: false,
                                selectionIndicator: false,
                                shadows: false,
                                shouldAnimate: false,
                                imageryProvider: new Cesium.ArcGisMapServerImageryProvider({
                                    url: 'https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer'
                                })
                            });
                            viewerCreated = true;
                            console.log('✅ Cesium viewer initialized with ArcGIS World Imagery');
                            updateConnectionStatus('Using ArcGIS World Imagery', 'warning');
                        } catch (arcgisError) {
                            console.error('ArcGIS also failed:', arcgisError.message);
                            throw new Error(`Failed to create viewer with any imagery provider. Last errors: ${viewerError?.message || 'unknown'}, ${osmError.message}, ${arcgisError.message}`);
                        }
                    }
                }

                // Set initial view
                viewer.camera.setView({
                    destination: Cesium.Cartesian3.fromDegrees(0, 20, 15000000),
                    orientation: {
                        heading: 0,
                        pitch: Cesium.Math.toRadians(-90),
                        roll: 0
                    }
                });
                
                console.log('✅ Cesium viewer initialized successfully');
                
                // Add a test marker to verify the globe is working
                viewer.entities.add({
                    position: Cesium.Cartesian3.fromDegrees(0, 0),
                    point: {
                        pixelSize: 15,
                        color: Cesium.Color.RED,
                        outlineColor: Cesium.Color.WHITE,
                        outlineWidth: 2
                    },
                    label: {
                        text: 'Prime Meridian (0,0)',
                        font: '14px sans-serif',
                        fillColor: Cesium.Color.WHITE,
                        outlineColor: Cesium.Color.BLACK,
                        outlineWidth: 2,
                        style: Cesium.LabelStyle.FILL_AND_OUTLINE,
                        pixelOffset: new Cesium.Cartesian2(0, -20)
                    }
                });
                
                // Check if imagery is loading properly after a short delay
                setTimeout(() => {
                    const layers = viewer.imageryLayers;
                    console.log(`Imagery layers loaded: ${layers.length}`);
                    
                    if (layers.length === 0) {
                        console.warn('⚠️ No imagery layers loaded! The globe may appear blue.');
                        updateConnectionStatus('No imagery loaded - globe may appear blue', 'warning');
                        
                        // Try to add a default imagery layer
                        try {
                            viewer.imageryLayers.addImageryProvider(
                                new Cesium.OpenStreetMapImageryProvider({
                                    url: 'https://a.tile.openstreetmap.org/'
                                })
                            );
                            console.log('✅ Added OpenStreetMap as fallback imagery layer');
                            updateConnectionStatus('Added OpenStreetMap as fallback', 'warning');
                        } catch (fallbackError) {
                            console.error('Failed to add fallback imagery:', fallbackError);
                        }
                    } else {
                        console.log('✅ Imagery layers are loading properly');
                        for (let i = 0; i < layers.length; i++) {
                            const layer = layers.get(i);
                            console.log(`  Layer ${i}: ${layer.imageryProvider.constructor.name}`);
                        }
                    }
                }, 2000);
                
                // Process any events that were queued before viewer was ready
                if (queuedEvents && queuedEvents.length > 0) {
                    console.log(`Processing ${queuedEvents.length} queued events`);
                    queuedEvents.forEach(event => {
                        addEventMarker(event);
                    });
                    queuedEvents = [];
                }
                
                return viewer;
            } catch (error) {
                console.error('❌ Failed to initialize Cesium viewer:', error);
                updateConnectionStatus('Failed to initialize 3D globe', 'error');
                
                // Create a minimal viewer as last resort
                try {
                    viewer = new Cesium.Viewer('cesiumContainer', {
                        animation: false,
                        timeline: false,
                        navigationHelpButton: false,
                        homeButton: false,
                        sceneModePicker: false,
                        baseLayerPicker: false,
                        fullscreenButton: false,
                        vrButton: false,
                        geocoder: false,
                        infoBox: false,
                        selectionIndicator: false,
                        shadows: false,
                        shouldAnimate: false
                    });
                    
                    // Set globe to a natural Earth color instead of blue
                    viewer.scene.globe.baseColor = Cesium.Color.fromCssColorString('#228B22');
                    
                    console.log('✅ Created minimal Cesium viewer with custom globe color');
                    updateConnectionStatus('Using minimal viewer with Earth color', 'warning');
                    
                    // Process any events that were queued before viewer was ready
                    if (queuedEvents && queuedEvents.length > 0) {
                        console.log(`Processing ${queuedEvents.length} queued events`);
                        queuedEvents.forEach(event => {
                            addEventMarker(event);
                        });
                        queuedEvents = [];
                    }
                    
                    return viewer;
                } catch (minimalError) {
                    console.error('❌ Even minimal viewer failed:', minimalError);
                    updateConnectionStatus('3D globe initialization completely failed', 'error');
                    throw error; // Re-throw the original error
                }
            }
        }

        // Event tracking
        let events = new Map();
        let totalEvents = 0;
        let liveEvents = 0;
        let eventEntities = new Map();
        let queuedEvents = []; // Events waiting for viewer initialization
        
        // Color mapping for event categories
        const categoryColors = {
            'earthquake': Cesium.Color.fromCssColorString('#ef4444'), // Red
            'storm': Cesium.Color.fromCssColorString('#3b82f6'),      // Blue
            'cyclone': Cesium.Color.fromCssColorString('#3b82f6'),    // Blue (alias for storm)
            'flood': Cesium.Color.fromCssColorString('#06b6d4'),     // Cyan
            'volcano': Cesium.Color.fromCssColorString('#f97316'),   // Orange
            'flight': Cesium.Color.fromCssColorString('#eab308'),    // Yellow
            'disaster': Cesium.Color.fromCssColorString('#8b5cf6'),  // Purple
            'drought': Cesium.Color.fromCssColorString('#a855f7'),   // Purple
            'default': Cesium.Color.fromCssColorString('#eab308')    // Yellow
        };

        // Size mapping for severity
        const severitySizes = {
            'critical': 20,
            'high': 16,
            'medium': 12,
            'low': 8,
            'default': 10
        };

        // Connect to SSE stream
        const sseUrl = backendURL + '/api/events/stream';
        let eventSource = null;
        
        function connectToSSE() {
            try {
                eventSource = new EventSource(sseUrl);
                
                eventSource.onopen = function() {
                    console.log('SSE connection established');
                    updateConnectionStatus('Connected to real-time stream', 'success');
                    updateConnectedClients(1);
                };
                
                eventSource.onmessage = function(event) {
                    try {
                        const data = JSON.parse(event.data);
                        processNewEvent(data);
                    } catch (e) {
                        console.error('Error parsing SSE data:', e);
                    }
                };
                
                eventSource.onerror = function(error) {
                    console.error('SSE connection error:', error);
                    updateConnectionStatus('Connection lost - reconnecting...', 'error');
                    updateConnectedClients(0);
                    
                    // Attempt to reconnect after 5 seconds
                    setTimeout(() => {
                        if (eventSource) {
                            eventSource.close();
                        }
                        connectToSSE();
                    }, 5000);
                };
                
            } catch (error) {
                console.error('Failed to create SSE connection:', error);
                updateConnectionStatus('Failed to connect - retrying...', 'error');
                
                // Retry connection
                setTimeout(connectToSSE, 5000);
            }
        }

        // Process new event from SSE
        function processNewEvent(eventData) {
            console.log('Processing event data:', eventData);
            const eventId = eventData.id;
            
            // Skip if we already have this event
            if (events.has(eventId)) {
                return;
            }
            
            // Store event
            events.set(eventId, eventData);
            totalEvents++;
            liveEvents++;
            
            // Update counters
            updateEventCounters();
            updateLastUpdate();
            
            // Add marker to globe
            addEventMarker(eventData);
            
            // Log for debugging
            console.log(`New event: ${eventData.title} (${eventData.category}) from ${eventData.source}`, eventData);
        }

        // Add event marker to Cesium globe
        function addEventMarker(event) {
            // Check if viewer is initialized
            if (!viewer) {
                console.warn('Cesium viewer not initialized yet, queuing event:', event.id);
                // Queue the event to be added when viewer is ready
                if (!queuedEvents) queuedEvents = [];
                queuedEvents.push(event);
                return;
            }
            
            const coordinates = event.location?.coordinates;
            if (!coordinates || !Array.isArray(coordinates) || coordinates.length < 2) {
                console.error('Invalid coordinates for event:', event.id, event.title, coordinates);
                return;
            }
            const longitude = coordinates[0];
            const latitude = coordinates[1];
            
            // Determine color based on category
            const category = event.category?.toLowerCase() || 'default';
            const color = categoryColors[category] || categoryColors['default'];
            console.log(`Marker color for ${event.category}:`, color, 'category:', category);
            
            // Determine size based on severity
            const severity = event.severity?.toLowerCase() || 'default';
            const size = severitySizes[severity] || severitySizes['default'];
            
            // Adjust size based on magnitude for earthquakes
            let finalSize = size;
            if (category === 'earthquake' && event.magnitude) {
                finalSize = Math.max(size, event.magnitude * 3);
            }
            
            // Create billboard (marker)
            const entity = viewer.entities.add({
                position: Cesium.Cartesian3.fromDegrees(longitude, latitude),
                billboard: {
                    image: createMarkerImage(color, finalSize),
                    scale: 1.0,
                    verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
                    heightReference: Cesium.HeightReference.CLAMP_TO_GROUND
                },
                name: event.title,
                description: createEventDescription(event)
            });
            
            // Store entity reference
            eventEntities.set(event.id, entity);
            
            // Add click handler
            entity.clickHandler = function() {
                showEventDetails(event);
            };
            
            // Add mouse enter/leave handlers for hover effect
            entity.mouseEnterHandler = function() {
                entity.billboard.scale = 1.2;
            };
            
            entity.mouseLeaveHandler = function() {
                entity.billboard.scale = 1.0;
            };
            
            // Register event handlers
            viewer.screenSpaceEventHandler.setInputAction(function(movement) {
                const pickedObject = viewer.scene.pick(movement.endPosition);
                if (Cesium.defined(pickedObject) && pickedObject.id === entity) {
                    entity.mouseEnterHandler();
                } else if (eventEntities.has(event.id)) {
                    entity.mouseLeaveHandler();
                }
            }, Cesium.ScreenSpaceEventType.MOUSE_MOVE);
            
            viewer.screenSpaceEventHandler.setInputAction(function(click) {
                const pickedObject = viewer.scene.pick(click.position);
                if (Cesium.defined(pickedObject) && pickedObject.id === entity) {
                    entity.clickHandler();
                }
            }, Cesium.ScreenSpaceEventType.LEFT_CLICK);
        }

        // Create custom marker image
        function createMarkerImage(color, size) {
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const context = canvas.getContext('2d');
            
            // Draw outer circle
            context.beginPath();
            context.arc(size/2, size/2, size/2 - 2, 0, Math.PI * 2);
            context.fillStyle = color.withAlpha(0.3).toCssColorString();
            context.fill();
            
            // Draw inner circle
            context.beginPath();
            context.arc(size/2, size/2, size/4, 0, Math.PI * 2);
            context.fillStyle = color.toCssColorString();
            context.fill();
            
            // Draw border
            context.beginPath();
            context.arc(size/2, size/2, size/2 - 2, 0, Math.PI * 2);
            context.strokeStyle = color.withAlpha(0.8).toCssColorString();
            context.lineWidth = 2;
            context.stroke();
            
            return canvas;
        }

        // Create HTML description for event popup
        function createEventDescription(event) {
            const magnitude = event.magnitude ? event.magnitude.toFixed(1) : 'N/A';
            const severity = event.severity || 'unknown';
            const category = event.category || 'unknown';
            const occurred = new Date(event.occurred_at).toLocaleString();
            const ingested = new Date(event.ingested_at).toLocaleString();
            
            return `
                <div style="padding: 10px; max-width: 300px;">
                    <h3 style="margin: 0 0 10px 0; color: #667eea;">${event.title}</h3>
                    <p style="margin: 0 0 10px 0; color: #666;">${event.description}</p>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                        <div>
                            <strong>Magnitude:</strong><br>
                            <span style="color: #ef4444; font-weight: bold;">${magnitude}</span>
                        </div>
                        <div>
                            <strong>Severity:</strong><br>
                            <span style="color: ${getSeverityColor(severity)}; font-weight: bold;">${severity}</span>
                        </div>
                        <div>
                            <strong>Category:</strong><br>
                            <span>${category}</span>
                        </div>
                        <div>
                            <strong>Source:</strong><br>
                            <span>${event.source}</span>
                        </div>
                    </div>
                    <div style="margin-top: 10px; font-size: 12px; color: #888;">
                        <div>Occurred: ${occurred}</div>
                        <div>Ingested: ${ingested}</div>
                    </div>
                    <button onclick="window.showEventDetails('${event.id}')" 
                            style="margin-top: 10px; padding: 5px 10px; background: #667eea; color: white; border: none; border-radius: 4px; cursor: pointer;">
                        View Details
                    </button>
                </div>
            `;
        }

        // Get color for severity
        function getSeverityColor(severity) {
            switch(severity.toLowerCase()) {
                case 'critical': return '#ef4444';
                case 'high': return '#f97316';
                case 'medium': return '#eab308';
                case 'low': return '#48bb78';
                default: return '#8a94a6';
            }
        }

        // Show event details in side panel
        function showEventDetails(event) {
            if (typeof event === 'string') {
                event = events.get(event);
            }
            
            if (!event) return;
            
            // Update panel content
            document.getElementById('eventTitle').textContent = event.title;
            document.getElementById('eventSource').textContent = `Source: ${event.source}`;
            
            const detailsHtml = `
                <div class="event-detail">
                    <div class="detail-label">Description</div>
                    <div class="detail-value">${event.description || 'No description available'}</div>
                </div>
                
                <div class="event-detail">
                    <div class="detail-label">Location</div>
                    <div class="detail-value">
                        ${event.location.coordinates[1].toFixed(4)}°N, 
                        ${event.location.coordinates[0].toFixed(4)}°E
                        <br>
                        <small>Precision: ${event.precision || 'unknown'}</small>
                    </div>
                </div>
                
                <div class="event-detail">
                    <div class="detail-label">Magnitude & Severity</div>
                    <div class="detail-value">
                        <span class="magnitude-badge" style="background: ${getSeverityColor(event.severity)}20; color: ${getSeverityColor(event.severity)};">
                            ${event.magnitude ? 'M ' + event.magnitude.toFixed(1) : 'N/A'}
                        </span>
                        <span class="severity-badge" style="background: ${getSeverityColor(event.severity)}20; color: ${getSeverityColor(event.severity)};">
                            ${event.severity || 'unknown'}
                        </span>
                    </div>
                </div>
                
                <div class="event-detail">
                    <div class="detail-label">Category</div>
                    <div class="detail-value">${event.category || 'unknown'}</div>
                </div>
                
                <div class="event-detail">
                    <div class="detail-label">Timestamps</div>
                    <div class="detail-value">
                        <div>Occurred: ${new Date(event.occurred_at).toLocaleString()}</div>
                        <div>Ingested: ${new Date(event.ingested_at).toLocaleString()}</div>
                    </div>
                </div>
                
                <div class="event-detail">
                    <div class="detail-label">Event ID</div>
                    <div class="detail-value" style="font-family: monospace; font-size: 12px;">${event.id}</div>
                </div>
                
                ${event.metadata ? `
                <div class="event-detail">
                    <div class="detail-label">Metadata</div>
                    <div class="detail-value">
                        <pre style="background: rgba(255,255,255,0.05); padding: 10px; border-radius: 4px; font-size: 12px; overflow: auto;">
${JSON.stringify(event.metadata, null, 2)}
                        </pre>
                    </div>
                </div>
                ` : ''}
                
                ${event.badges && event.badges.length > 0 ? `
                <div class="event-detail">
                    <div class="detail-label">Badges</div>
                    <div class="detail-value">
                        ${event.badges.map(badge => `
                            <span style="display: inline-block; background: rgba(102,126,234,0.1); color: #667eea; padding: 2px 8px; border-radius: 12px; font-size: 11px; margin: 2px;">
                                ${badge.label}
                            </span>
                        `).join('')}
                    </div>
                </div>
                ` : ''}
            `;
            
            document.getElementById('eventDetails').innerHTML = detailsHtml;
            
            // Show panel
            document.getElementById('eventPanel').style.display = 'block';
            
            // Fly to event location if viewer is initialized
            if (viewer) {
                const coordinates = event.location.coordinates;
                viewer.camera.flyTo({
                    destination: Cesium.Cartesian3.fromDegrees(coordinates[0], coordinates[1], 1000000),
                    duration: 2,
                    complete: function() {
                        // Add a slight tilt for better view
                        viewer.camera.flyTo({
                            destination: Cesium.Cartesian3.fromDegrees(coordinates[0], coordinates[1], 500000),
                            orientation: {
                                heading: 0,
                                pitch: Cesium.Math.toRadians(-45),
                                roll: 0
                            },
                            duration: 1
                        });
                    }
                });
            } else {
                console.warn('Cannot fly to event location: Cesium viewer not initialized');
            }
        }

        // Close event panel
        function closeEventPanel() {
            document.getElementById('eventPanel').style.display = 'none';
        }

        // Update event counters
        function updateEventCounters() {
            document.getElementById('totalEvents').textContent = totalEvents;
            document.getElementById('liveEventCount').textContent = liveEvents;
            
            // Update counter badge color based on live events
            const counterBadge = document.querySelector('.counter-badge');
            if (liveEvents > 10) {
                counterBadge.style.background = 'rgba(220, 38, 38, 0.9)';
            } else if (liveEvents > 5) {
                counterBadge.style.background = 'rgba(234, 179, 8, 0.9)';
            } else {
                counterBadge.style.background = 'rgba(34, 197, 94, 0.9)';
            }
        }

        // Update connection status
        function updateConnectionStatus(message, type) {
            const statusElement = document.getElementById('connectionStatus');
            const dotElement = document.querySelector('.status-dot');
            
            statusElement.textContent = message;
            
            switch(type) {
                case 'success':
                    dotElement.style.background = '#48bb78';
                    break;
                case 'error':
                    dotElement.style.background = '#ef4444';
                    break;
                case 'warning':
                    dotElement.style.background = '#eab308';
                    break;
            }
        }

        // Update connected clients count
        function updateConnectedClients(count) {
            document.getElementById('connectedClients').textContent = count;
        }

        // Update last update time
        function updateLastUpdate() {
            const now = new Date();
            const timeString = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            document.getElementById('lastUpdate').textContent = timeString;
        }

        // Load existing events from API
        async function loadExistingEvents() {
            try {
                // Load more events to get a better mix (not just recent flights)
                console.log('Loading existing events from:', backendURL + '/api/events?limit=200');
                const response = await fetch(backendURL + '/api/events?limit=200');
                console.log('Response status:', response.status);
                const data = await response.json();
                console.log('Response data:', data);
                
                if (data.events && Array.isArray(data.events)) {
                    console.log(`Found ${data.events.length} total events`);
                    
                    // Group events by category to ensure we show a mix
                    const eventsByCategory = {};
                    data.events.forEach(event => {
                        const category = event.category || 'unknown';
                        if (!eventsByCategory[category]) {
                            eventsByCategory[category] = [];
                        }
                        eventsByCategory[category].push(event);
                    });
                    
                    // Take up to 5 events from each category to ensure variety
                    const eventsToShow = [];
                    Object.keys(eventsByCategory).forEach(category => {
                        const categoryEvents = eventsByCategory[category];
                        // Take most recent events from each category
                        const recentEvents = categoryEvents
                            .sort((a, b) => new Date(b.occurred_at) - new Date(a.occurred_at))
                            .slice(0, 5);
                        eventsToShow.push(...recentEvents);
                    });
                    
                    console.log(`Showing ${eventsToShow.length} events from ${Object.keys(eventsByCategory).length} categories`);
                    
                    // Process the selected events
                    eventsToShow.forEach(event => {
                        processNewEvent(event);
                    });
                    
                    // Update event list after loading
                    updateEventList();
                } else {
                    console.log('No events array in response');
                }
            } catch (error) {
                console.error('Failed to load existing events:', error);
            }
        }

        // Initialize dashboard
        async function initDashboard() {
            console.log('Initializing SENTINEL Dashboard...');
            
            try {
                // Initialize Cesium viewer first
                await initializeCesiumViewer();
                console.log('Cesium viewer ready');
                
                // Connect to SSE stream
                connectToSSE();
                
                // Load existing events
                loadExistingEvents();
                
                // Update last update time
                updateLastUpdate();
                
                // Set up periodic updates
                setInterval(updateLastUpdate, 60000); // Update every minute
                
                // Make showEventDetails available globally
                window.showEventDetails = showEventDetails;
                
                console.log('Dashboard initialized successfully');
            } catch (error) {
                console.error('Failed to initialize dashboard:', error);
                updateConnectionStatus('Failed to initialize 3D globe', 'error');
            }
        }

        // Event filtering and search
        let currentFilter = 'all';
        let currentSearch = '';
        
        function setEventFilter(filter) {
            currentFilter = filter;
            
            // Update active button
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent.toLowerCase() === filter) {
                    btn.classList.add('active');
                }
            });
            
            // Update event list
            updateEventList();
        }
        
        function filterEvents() {
            currentSearch = document.getElementById('eventSearch').value.toLowerCase();
            updateEventList();
        }
        
        function updateEventList() {
            const eventList = document.getElementById('eventList');
            const eventListCount = document.getElementById('eventListCount');
            
            // Filter events
            let filteredEvents = Array.from(events.values());
            
            // Apply category filter
            if (currentFilter !== 'all') {
                filteredEvents = filteredEvents.filter(event => 
                    event.category && event.category.toLowerCase() === currentFilter
                );
            }
            
            // Apply search filter
            if (currentSearch) {
                filteredEvents = filteredEvents.filter(event => 
                    (event.title && event.title.toLowerCase().includes(currentSearch)) ||
                    (event.description && event.description.toLowerCase().includes(currentSearch)) ||
                    (event.source && event.source.toLowerCase().includes(currentSearch))
                );
            }
            
            // Sort by most recent first
            filteredEvents.sort((a, b) => new Date(b.occurred_at) - new Date(a.occurred_at));
            
            // Update count
            eventListCount.textContent = `${filteredEvents.length} events`;
            
            // Clear list
            eventList.innerHTML = '';
            
            if (filteredEvents.length === 0) {
                eventList.innerHTML = '<div class="no-events">No events match your criteria</div>';
                return;
            }
            
            // Add events to list
            filteredEvents.forEach(event => {
                const eventItem = document.createElement('div');
                eventItem.className = 'event-item';
                eventItem.onclick = () => {
                    // Remove active class from all items
                    document.querySelectorAll('.event-item').forEach(item => {
                        item.classList.remove('active');
                    });
                    // Add active class to clicked item
                    eventItem.classList.add('active');
                    // Show event details
                    showEventDetails(event);
                };
                
                const markerColor = getCategoryColor(event.category);
                const occurredTime = new Date(event.occurred_at);
                const timeAgo = getTimeAgo(occurredTime);
                
                eventItem.innerHTML = `
                    <div class="event-marker" style="background: ${markerColor};"></div>
                    <div class="event-content">
                        <div class="event-title">${event.title || 'Untitled Event'}</div>
                        <div class="event-meta">
                            <span class="event-source">${event.source || 'Unknown'}</span>
                            <span class="event-time">${timeAgo}</span>
                        </div>
                    </div>
                `;
                
                eventList.appendChild(eventItem);
            });
        }
        
        function getCategoryColor(category) {
            if (!category) return '#fbbf24'; // yellow for unknown
            
            switch(category.toLowerCase()) {
                case 'earthquake': return '#ef4444'; // red
                case 'storm': return '#3b82f6'; // blue
                case 'cyclone': return '#3b82f6'; // blue (alias for storm)
                case 'flood': return '#06b6d4'; // cyan
                case 'volcano': return '#f97316'; // orange
                case 'flight': return '#fbbf24'; // yellow
                case 'disaster': return '#8b5cf6'; // purple
                case 'drought': return '#a855f7'; // purple
                default: return '#fbbf24'; // yellow for other
            }
        }
        
        function getTimeAgo(date) {
            const now = new Date();
            const diffMs = now - date;
            const diffMins = Math.floor(diffMs / 60000);
            const diffHours = Math.floor(diffMs / 3600000);
            const diffDays = Math.floor(diffMs / 86400000);
            
            if (diffMins < 1) return 'Just now';
            if (diffMins < 60) return `${diffMins}m ago`;
            if (diffHours < 24) return `${diffHours}h ago`;
            if (diffDays < 7) return `${diffDays}d ago`;
            return date.toLocaleDateString();
        }
        
        // Update event list when new events arrive
        function updateEventListOnNewEvent() {
            updateEventList();
        }
        
        // Modify processNewEvent to update event list
        const originalProcessNewEvent = processNewEvent;
        processNewEvent = function(eventData) {
            originalProcessNewEvent(eventData);
            updateEventListOnNewEvent();
        };

        // Start dashboard when page loads
        document.addEventListener('DOMContentLoaded', initDashboard);
        
        // Handle page unload
        window.addEventListener('beforeunload', function() {
            if (eventSource) {
                eventSource.close();
            }
        });
    </script>
</body>
</html>
