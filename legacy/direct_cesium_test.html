<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Direct Cesium Test</title>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.119/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.119/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; }
        #cesiumContainer { width: 100vw; height: 100vh; }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.85);
            color: white;
            padding: 15px;
            border-radius: 8px;
            z-index: 1000;
            max-width: 600px;
            font-family: monospace;
            font-size: 14px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .success { color: #4CAF50; }
        .error { color: #f44336; }
        .warning { color: #ff9800; }
    </style>
</head>
<body>
    <div id="info">
        <h3 style="margin-top: 0; color: #4CAF50;">Direct Cesium Test</h3>
        <div id="status">Initializing...</div>
        <div id="details"></div>
    </div>
    <div id="cesiumContainer"></div>
    
    <script>
        // Same token as dashboard
        Cesium.Ion.defaultAccessToken = window.SENTINEL_CONFIG?.cesiumToken || '';;
        
        async function initializeTest() {
            const status = document.getElementById('status');
            const details = document.getElementById('details');
            
            try {
                status.innerHTML = 'Step 1: Testing Cesium Ion token...';
                
                // Test token by trying to access an asset
                const testProvider = new Cesium.IonImageryProvider({ assetId: 2 });
                await testProvider.readyPromise;
                
                status.innerHTML = '<span class="success">✅ Step 1: Cesium Ion token is valid</span>';
                details.innerHTML += '<div class="success">Token can access asset 2 (Bing Maps Aerial)</div>';
                
                // Step 2: Create terrain provider
                status.innerHTML += '<br>Step 2: Creating terrain provider...';
                
                let terrainProvider;
                try {
                    terrainProvider = await Cesium.createWorldTerrainAsync();
                    details.innerHTML += '<div class="success">✅ Terrain provider created successfully</div>';
                } catch (terrainError) {
                    details.innerHTML += `<div class="warning">⚠️ Terrain provider failed: ${terrainError.message}</div>`;
                    terrainProvider = undefined;
                }
                
                // Step 3: Create viewer
                status.innerHTML += '<br>Step 3: Creating viewer with imagery...';
                
                const viewer = new Cesium.Viewer('cesiumContainer', {
                    terrainProvider: terrainProvider,
                    baseLayerPicker: true, // Enable layer picker
                    animation: false,
                    timeline: false,
                    navigationHelpButton: false,
                    imageryProvider: new Cesium.IonImageryProvider({ assetId: 2 })
                });
                
                status.innerHTML += '<br><span class="success">✅ Step 3: Viewer created successfully</span>';
                details.innerHTML += '<div class="success">Viewer created with Bing Maps Aerial (asset 2)</div>';
                
                // Set view
                viewer.camera.setView({
                    destination: Cesium.Cartesian3.fromDegrees(0, 20, 15000000),
                    orientation: {
                        heading: 0,
                        pitch: Cesium.Math.toRadians(-90),
                        roll: 0
                    }
                });
                
                // Add test marker
                viewer.entities.add({
                    position: Cesium.Cartesian3.fromDegrees(0, 0),
                    point: {
                        pixelSize: 15,
                        color: Cesium.Color.RED,
                        outlineColor: Cesium.Color.WHITE,
                        outlineWidth: 2
                    },
                    label: {
                        text: 'Test Marker (0,0)',
                        font: '14px sans-serif',
                        fillColor: Cesium.Color.WHITE,
                        outlineColor: Cesium.Color.BLACK,
                        outlineWidth: 2,
                        style: Cesium.LabelStyle.FILL_AND_OUTLINE,
                        pixelOffset: new Cesium.Cartesian2(0, -20)
                    }
                });
                
                // Check imagery layers after delay
                setTimeout(() => {
                    const layers = viewer.imageryLayers;
                    details.innerHTML += `<div>Imagery layers loaded: ${layers.length}</div>`;
                    
                    if (layers.length === 0) {
                        details.innerHTML += '<div class="error">❌ No imagery layers loaded! Globe will appear blue.</div>';
                        details.innerHTML += '<div class="warning">Trying to add OpenStreetMap as fallback...</div>';
                        
                        try {
                            viewer.imageryLayers.addImageryProvider(
                                new Cesium.OpenStreetMapImageryProvider({
                                    url: 'https://a.tile.openstreetmap.org/'
                                })
                            );
                            details.innerHTML += '<div class="success">✅ Added OpenStreetMap as fallback</div>';
                        } catch (fallbackError) {
                            details.innerHTML += `<div class="error">❌ Failed to add fallback: ${fallbackError.message}</div>`;
                        }
                    } else {
                        details.innerHTML += '<div class="success">✅ Imagery is loading properly</div>';
                        for (let i = 0; i < layers.length; i++) {
                            const layer = layers.get(i);
                            details.innerHTML += `<div>  Layer ${i}: ${layer.imageryProvider.constructor.name}</div>`;
                        }
                    }
                }, 2000);
                
                // Final status
                status.innerHTML += '<br><span class="success">✅ Cesium test completed successfully!</span>';
                details.innerHTML += '<div class="success">If you see Earth imagery instead of a blue sphere, the fix works!</div>';
                
            } catch (error) {
                status.innerHTML = `<span class="error">❌ Test failed: ${error.message}</span>`;
                details.innerHTML += `<div class="error">Error details: ${error}</div>`;
                console.error('Test error:', error);
                
                // Try fallback
                details.innerHTML += '<div class="warning">Trying fallback with simple viewer...</div>';
                
                try {
                    const viewer = new Cesium.Viewer('cesiumContainer', {
                        baseLayerPicker: true,
                        animation: false,
                        timeline: false,
                        navigationHelpButton: false
                    });
                    
                    // Set globe color to green instead of blue
                    viewer.scene.globe.baseColor = Cesium.Color.fromCssColorString('#228B22');
                    
                    details.innerHTML += '<div class="success">✅ Created simple viewer with custom globe color</div>';
                } catch (fallbackError) {
                    details.innerHTML += `<div class="error">❌ Fallback also failed: ${fallbackError.message}</div>`;
                }
            }
        }
        
        // Initialize when page loads
        document.addEventListener('DOMContentLoaded', initializeTest);
    </script>
</body>
</html>
